<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Client Login — Agents at Work</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F9F7F3;--surface:#fff;--border:#E8E3DA;--ink:#1A1814;--mid:#7A7568;--dim:#B8B2A8;--green:#1F6644;--green-bg:#EAF2ED;--green-line:rgba(31,102,68,.22);--shadow:0 2px 32px rgba(0,0,0,.09)}
body{background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.dot-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,#C5BDB0 1px,transparent 1px);background-size:30px 30px;opacity:.4}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px)}
.orb1{width:500px;height:400px;background:radial-gradient(circle,rgba(31,102,68,.12) 0%,transparent 70%);top:-150px;left:-100px;animation:drift1 14s ease-in-out infinite}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(200,135,58,.09) 0%,transparent 70%);bottom:100px;right:-80px;animation:drift2 18s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,60px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:2px;box-shadow:var(--shadow);width:100%;max-width:400px;overflow:hidden;animation:fadeUp .5s ease both}
.card-top{padding:2.2rem 2.2rem 1.8rem;border-bottom:1px solid var(--border)}
.logo{font-family:'Instrument Serif',serif;font-size:1.15rem;color:var(--ink);text-decoration:none;letter-spacing:-.02em;display:block;margin-bottom:1.6rem}
.logo span{color:var(--green)}
h1{font-family:'Instrument Serif',serif;font-size:1.6rem;letter-spacing:-.02em;margin-bottom:.35rem}
.subtitle{font-size:.83rem;color:var(--mid)}
.card-body{padding:2rem 2.2rem}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
label{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--mid);letter-spacing:.06em;text-transform:uppercase}
input{width:100%;padding:.85rem 1rem;border:1.5px solid var(--border);border-radius:2px;font-family:'Geist',sans-serif;font-size:.9rem;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s;font-weight:300}
input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(31,102,68,.07)}
input::placeholder{color:var(--dim)}
.login-btn{width:100%;margin-top:.5rem;padding:.9rem;background:var(--green);color:#fff;border:none;border-radius:2px;font-family:'Geist',sans-serif;font-weight:500;font-size:.9rem;cursor:pointer;transition:background .2s,transform .15s}
.login-btn:hover{background:#174f35;transform:translateY(-1px)}
.err{display:none;margin-top:.8rem;padding:.7rem .9rem;background:#fef0f0;border:1px solid rgba(192,57,43,.3);border-radius:2px;font-size:.8rem;color:#c0392b;font-family:'DM Mono',monospace}
.card-foot{padding:1.2rem 2.2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.foot-note{font-size:.75rem;color:var(--dim)}
.foot-link{font-size:.78rem;color:var(--green);text-decoration:none}
.foot-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="dot-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="card">
  <div class="card-top">
    <a class="logo" href="https://agentsatwork.co">agents at <span>work</span></a>
    <h1>Client portal</h1>
    <p class="subtitle">Sign in to access your AI marketing tools.</p>
  </div>
  <div class="card-body">
    <div class="field">
      <label>Email</label>
      <input type="email" id="fEmail" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="fPassword" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="login-btn" id="loginBtn">Sign in →</button>
    <div class="err" id="errMsg">Incorrect email or password. Please try again.</div>
  </div>
  <div class="card-foot">
    <span class="foot-note">Not a client yet?</span>
    <a class="foot-link" href="https://agentsatwork.co">Learn more →</a>
  </div>
</div>

<script>
// Client credentials — add new clients here
// Format: { email: 'client@email.com', password: 'their-password' }
var CLIENTS = [
  { email: 'rupert@agentsatwork.co', password: 'agents2026' },
  { email: 'admin@agentsatwork.co', password: 'admin2026' }
];

document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('fPassword').addEventListener('keydown', function(e){ if(e.key==='Enter') login(); });

function login() {
  var email = document.getElementById('fEmail').value.trim().toLowerCase();
  var password = document.getElementById('fPassword').value;
  var err = document.getElementById('errMsg');

  var match = CLIENTS.find(function(c){ return c.email === email && c.password === password; });

  if (match) {
    // Store session
    sessionStorage.setItem('aaw_auth', JSON.stringify({ email: email, ts: Date.now() }));
    window.location.href = 'dashboard.html';
  } else {
    err.style.display = 'block';
    document.getElementById('fPassword').value = '';
  }
}

// If already logged in, redirect
if (sessionStorage.getItem('aaw_auth')) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
